name: Backend CI/CD - university-backend

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: 🧱 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔧 Make gradlew executable
        run: chmod +x ./gradlew

      - name: 🧪 Build and test with Gradle
        run: ./gradlew clean test bootJar --no-daemon

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/byronmoreno/university-backend:latest

      - name: 🧾 Mostrar variables básicas (solo locales, no secretos)
        run: |
          echo "Host: ${{ secrets.VPS_HOST }}"
          echo "Usuario: ${{ secrets.VPS_USER }}"
          echo "Puerto SSH: ${{ secrets.VPS_SSH_PORT }}"

      - name: 🧪 Probar conexión SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "✅ Conexión exitosa desde GitHub Actions"
            hostname
            whoami
            uptime

      - name: 📦 Copiar stack.yml al VPS (SCP)
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "stack.yml"
          target: "/home/${{ secrets.VPS_USER }}/university-backend"

      - name: 🚀 Despliegue de servicios en Docker Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "Desplegando servicios de university-backend"
            cd ~/university-backend

            echo "Descargando la imagen desde GHCR"
            echo "${{ secrets.GHCR_PATH }}" | docker login ghcr.io -u byronmoreno --password-stdin
            docker pull ghcr.io/byronmoreno/university-backend:latest

            echo "Deteniendo el stack anterior (si existe)"
            docker stack rm university || true

            echo "Esperar 20 segundos..."
            sleep 20

            echo "Desplegando el stack con Traefik"
            docker stack deploy --with-registry-auth -c stack.yml university

            echo "Contenedores en ejecución:"
            docker ps

